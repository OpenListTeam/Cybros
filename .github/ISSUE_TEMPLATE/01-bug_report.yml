name: "Bug Report"
description: "Report a reproducible bug"
title: "[BUG] Please modify the title to describe the issue you are facing"
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to fill out this form.
        Please make sure this submission is not a duplicate, is relevant to this project, and includes enough information for maintainers to evaluate it.

  - type: checkboxes
    id: confirmations
    attributes:
      label: "Please confirm the following"
      description: |
        You must read, check, confirm, and agree to all items that apply before submitting this form.
        Submissions that do not provide enough information or do not follow the community rules may be closed.
      options:
        - label: |
            I have read and agree to [AGPL-3.0 Section 15](https://www.gnu.org/licenses/agpl-3.0.txt#:~:text=15.%20Disclaimer%20of%20Warranty.).
            The program is provided "as is" without any warranties; I bear all risks of using it.
          required: true
        - label: |
            I have read and agree to [AGPL-3.0 Section 16](https://www.gnu.org/licenses/agpl-3.0.txt#:~:text=16.%20Limitation%20of%20Liability.).
            The copyright holders and distributors are not liable for any damages resulting from the use or inability to use the program.
          required: true
        - label: "I have searched existing issues and discussions and confirmed this is not a duplicate."
          required: true
        - label: "I have read the relevant documentation for this project."
          required: true
        - label: "I confirm this is a project bug, not a support request caused by network, dependencies, configuration, operation, or third-party software."
          required: true
        - label: "I believe this submission must be handled by this project and not by a third party."
          required: true
        - label: "I confirm this bug is not fixed in the latest version, commit, or default branch."
          required: true
        - label: "I confirm this bug is reproducible or supported by clear evidence."
          required: true
        - label: "I confirm this submission is clear, polite, actionable, and complies with the Code of Conduct."
          required: true
        - label: "I have not read these checkboxes and therefore I just ticked them all. Please close this issue."
          required: false
